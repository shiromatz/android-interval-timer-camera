name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and verify debug APK
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/LongIntervalCamera-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LongIntervalCamera-debug-apk
          path: artifacts/LongIntervalCamera-debug.apk

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/LongIntervalCamera-debug.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/LongIntervalCamera-debug.apk --title "$GITHUB_REF_NAME" --notes "Debug APK for sideload testing."
          fi
