name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and verify debug APK
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Upload debug APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: LongIntervalCamera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Check release signing secrets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_KEYSTORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Prepare release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/LongIntervalCamera-release.apk
          sha256sum artifacts/LongIntervalCamera-release.apk > artifacts/LongIntervalCamera-release.apk.sha256

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: LongIntervalCamera-release-apk
          path: |
            artifacts/LongIntervalCamera-release.apk
            artifacts/LongIntervalCamera-release.apk.sha256

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/LongIntervalCamera-release.apk artifacts/LongIntervalCamera-release.apk.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/LongIntervalCamera-release.apk artifacts/LongIntervalCamera-release.apk.sha256 --title "$GITHUB_REF_NAME" --notes "Signed release APK for sideload installation."
          fi
